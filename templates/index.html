<!DOCTYPE html>
<html>
<head>
    <title>Fake News Detection</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            width: 500px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: none;
            font-size: 15px;
            transition: 0.3s;
        }

        textarea:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 8px rgba(102,126,234,0.4);
        }

        input[type="submit"] {
            margin-top: 15px;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        input[type="submit"]:hover {
            background: #5a67d8;
            transform: scale(1.05);
        }

        .result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }

        .real {
            color: green;
        }

        .fake {
            color: red;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>📰 Fake News Detector</h1>

        <form method="POST">
            <textarea name="news" rows="5" placeholder="Enter news headline..." required=True></textarea>
            <br>
            <input type="submit" value="Check News">
        </form>

        {% if result %}
            <div class="result 
                {% if 'Real' in result %}real{% else %}fake{% endif %}">
                {{ result }}
            </div>
        {% endif %}
    </div>

</body>
</html>
